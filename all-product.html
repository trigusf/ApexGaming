<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="stylesheet" href="src/css/output.css">
    <title>All Product</title>
</head>
<body>

    <div id="nav"></div>

    <div class="min-h-screen flex justify-center">
        <div class="w-full max-w-6xl pt-32 flex flex-col p-4 gap-4">
            <div class="flex flex-col gap-4">
                <span class="text-sm tracking-widest opacity-65">SHOP</span>
                <h1 class="font-bold text-4xl">All Product</h1>
                <p class="max-w-xl text-sm lg:text-base opacity-65">Explore our complete collection of premium gaming peripherals. Every product is precision-engineered for competitive performance.</p>
            </div>

            <div class="w-full flex flex-col gap-4 lg:flex-row lg:justify-between">
                <div class="flex gap-4 items-center">
                    <p class="text-sm opacity-65">18 products</p>
                    <select name="Featured" id="Featured" class="select select-sm w-36 rounded-lg bg-primary/20 border-white/5">
                        <option value="Featured">Featured</option>
                        <option value="newest">Newest</option>
                        <option value="lowPrice">Price: Low to High</option>
                        <option value="highPrice">Price: High to Low</option>
                        <option value="topRated">Top Rated</option>
                    </select>
                </div>
                <div>
                    <ul class="flex gap-2">
                        <li class="text-xs font-medium bg-white text-black p-1.5 px-3 rounded-4xl border border-white/10 hover:opacity-100">All</li>
                        <li class="text-xs font-medium opacity-65 bg-primary/20 p-1.5 px-3 rounded-4xl border border-white/10 hover:opacity-100">Keyboards</li>
                        <li class="text-xs font-medium opacity-65 bg-primary/20 p-1.5 px-3 rounded-4xl border border-white/10 hover:opacity-100">Mouse</li>
                        <li class="text-xs font-medium opacity-65 bg-primary/20 p-1.5 px-3 rounded-4xl border border-white/10 hover:opacity-100">Headsets</li>
                        <li class="text-xs font-medium opacity-65 bg-primary/20 p-1.5 px-3 rounded-4xl border border-white/10 hover:opacity-100">Accessories</li>
                    </ul>
                </div>
                
            </div>


            <div id="allProduct" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                
            </div>
        </div>

        

    </div>
    
    <div id="footer"></div>
<script src="src/js/product-data.js"></script>
<script src="src/js/script.js"></script>
<script src="src/js/detail-product.js"></script>
</body>
</html>
